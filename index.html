<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitish Construction Services</title>

    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            font-family: 'Poppins', sans-serif;
        }

        /* Abstract shapes background elements */
        body::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: #ff0076;
            border-radius: 50%;
            top: -100px;
            left: -100px;
            box-shadow: 0 0 100px #ff0076;
            z-index: 1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00f0ff;
            border-radius: 50%;
            bottom: -50px;
            right: -50px;
            box-shadow: 0 0 100px #00f0ff;
            z-index: 1;
        }

        /* Specific Icon Colors on Hover */
        .social-btn:hover .fa-facebook-f {
            color: #1877F2;
        }

        .social-btn:hover .fa-instagram {
            color: #E1306C;
        }

        .social-btn:hover .fa-whatsapp {
            color: #25D366;
        }

        .social-btn:hover .fa-phone {
            color: #00e676;
        }

        .social-btn:hover .fa-envelope {
            color: #ea4335;
        }
    </style>
</head>

<body
    class="min-h-screen w-screen overflow-x-hidden bg-gradient-to-br from-[#0f2027] via-[#203a43] to-[#2c5364] flex justify-center items-center relative">

    <div
        class="relative z-10 bg-white/5 backdrop-blur-2xl border border-white/10 shadow-2xl rounded-3xl p-10 w-11/12 max-w-sm text-center text-white">
        <!-- Replace the src URL with your actual image link or local file -->
        <div class="mb-4 flex justify-center">

            <a href="https://raj9113.github.io/nitishconstructionservices/">
                <img src="./logo.png" alt="Profile Picture"
                    class="w-24 h-24 rounded-full border-2 border-white/30 object-cover bg-white/10">
            </a>
        </div>

        <h1 class="text-2xl font-semibold tracking-wider mb-1">Nitish Construction Services</h1>
        <p class="text-sm font-light text-white/70 mb-8">Your one step solution for construction work and building your
            dream Home. We provide skilled member and best construction materials to build and design your Home.</p>

        <div class="flex flex-col gap-4">
            <!-- target="_blank" ensures it opens in a new tab -->
            <a href="https://facebook.com/yourprofile" target="_blank"
                class="social-btn no-underline text-white bg-white/5 border border-white/15 hover:bg-white/15 hover:-translate-y-1 hover:shadow-lg hover:border-white/40 px-5 py-3.5 rounded-xl flex items-center justify-center gap-3 text-base font-normal transition-all duration-300">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>

            <a href="https://instagram.com/yourprofile" target="_blank"
                class="social-btn no-underline text-white bg-white/5 border border-white/15 hover:bg-white/15 hover:-translate-y-1 hover:shadow-lg hover:border-white/40 px-5 py-3.5 rounded-xl flex items-center justify-center gap-3 text-base font-normal transition-all duration-300">
                <i class="fab fa-instagram"></i> Instagram
            </a>

            <!-- WhatsApp link format: wa.me/countrycode+number -->
            <a href="https://wa.me/919508047136" target="_blank"
                class="social-btn no-underline text-white bg-white/5 border border-white/15 hover:bg-white/15 hover:-translate-y-1 hover:shadow-lg hover:border-white/40 px-5 py-3.5 rounded-xl flex items-center justify-center gap-3 text-base font-normal transition-all duration-300">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>

            <!-- tel: prompts the device phone dialer -->
            <a href="tel:+910000000000"
                class="social-btn no-underline text-white bg-white/5 border border-white/15 hover:bg-white/15 hover:-translate-y-1 hover:shadow-lg hover:border-white/40 px-5 py-3.5 rounded-xl flex items-center justify-center gap-3 text-base font-normal transition-all duration-300">
                <i class="fas fa-phone"></i> Contact
            </a>

            <!-- mailto: prompts the default email client -->
            <a href="mailto:your.email@gmail.com"
                class="social-btn no-underline text-white bg-white/5 border border-white/15 hover:bg-white/15 hover:-translate-y-1 hover:shadow-lg hover:border-white/40 px-5 py-3.5 rounded-xl flex items-center justify-center gap-3 text-base font-normal transition-all duration-300">
                <i class="fas fa-envelope"></i> Email
            </a>
        </div>
    </div>

</body>

</html>
