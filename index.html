<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nitish Construction Services</title>
    
    <!-- Font Awesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Prevent horizontal scrolling on small viewports */
        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        /* Make images responsive */
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Dark gradient background */
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            position: relative;
            overflow: hidden;
        }

        /* Abstract shapes to highlight the glass blur */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: 1;
        }

        body::before {
            width: 350px;
            height: 350px;
            background: #ff0076;
            top: -100px;
            left: -100px;
            box-shadow: 0 0 100px #ff0076;
        }

        body::after {
            width: 300px;
            height: 300px;
            background: #00f0ff;
            bottom: -50px;
            right: -50px;
            box-shadow: 0 0 100px #00f0ff;
        }

        /* Glassmorphism Container */
        .glass-container {
            position: relative;
            z-index: 10; /* Keeps card above background shapes */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: #ffffff;
        }

        /* Profile Image */
        .profile-img img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 15px;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        /* Link Buttons */
        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .social-btn {
            text-decoration: none;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Specific Icon Colors on Hover */
        .social-btn:hover .fa-facebook-f { color: #1877F2; }
        .social-btn:hover .fa-instagram { color: #E1306C; }
        .social-btn:hover .fa-whatsapp { color: #25D366; }
        .social-btn:hover .fa-phone { color: #00e676; }
        .social-btn:hover .fa-envelope { color: #ea4335; }

    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Replace the src URL with your actual image link or local file -->
        <div class="profile-img">
            <img src="https://ui-avatars.com/api/?name=Sanjeev+Kumar&background=random&color=fff&size=100" alt="Profile Picture">
        </div>
        
        <h1>Nitish Construction Services</h1>
        <p>Your one step solution for construction work and building your dream Home. We provide skilled member and best construction materials to build and design your Home.</p>
        
        <div class="links-wrapper">
            <!-- target="_blank" ensures it opens in a new tab -->
            <a href="https://facebook.com/yourprofile" target="_blank" class="social-btn">
                <i class="fab fa-facebook-f"></i> Facebook
            </a>
            
            <a href="https://instagram.com/yourprofile" target="_blank" class="social-btn">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            
            <!-- WhatsApp link format: wa.me/countrycode+number -->
            <a href="https://wa.me/919508047136" target="_blank" class="social-btn">
                <i class="fab fa-whatsapp"></i> WhatsApp
            </a>
            
            <!-- tel: prompts the device phone dialer -->
            <a href="tel:+910000000000" class="social-btn">
                <i class="fas fa-phone"></i> Contact
            </a>
            
            <!-- mailto: prompts the default email client -->
            <a href="mailto:your.email@gmail.com" class="social-btn">
                <i class="fas fa-envelope"></i> Email
            </a>
        </div>
    </div>

</body>
</html>
